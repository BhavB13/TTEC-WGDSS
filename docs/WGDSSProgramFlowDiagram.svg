<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img" aria-labelledby="title description">
  <title id="title">WGDSS Program Flow Diagram</title>
  <desc id="description">Visual flow from weather, simulated grid, calibration, storm, and map sources through the WGDSS backend decision services to the React control-room dashboard.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#071426"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="liveFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#083344"/>
      <stop offset="1" stop-color="#0e2440"/>
    </linearGradient>
    <linearGradient id="decisionFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#052e2b"/>
      <stop offset="1" stop-color="#123044"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#000814" flood-opacity="0.55"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowLive" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrowSimulated" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowCalibration" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#f472b6"/>
    </marker>
    <marker id="arrowInternal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowOutput" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#34d399"/>
    </marker>
    <style>
      .section-label { fill: #67e8f9; font: 700 18px Inter, Segoe UI, sans-serif; letter-spacing: 3px; }
      .box-title { fill: #f8fafc; font: 700 18px Inter, Segoe UI, sans-serif; }
      .box-copy { fill: #cbd5e1; font: 400 14px Inter, Segoe UI, sans-serif; }
      .small { fill: #94a3b8; font: 400 12px Inter, Segoe UI, sans-serif; }
      .tag { font: 700 11px Inter, Segoe UI, sans-serif; letter-spacing: 1px; }
      .arrow-label { fill: #bae6fd; font: 600 12px Inter, Segoe UI, sans-serif; }
      .live-box { fill: url(#liveFill); stroke: #0891b2; stroke-width: 1.5; }
      .sim-box { fill: #2b251a; stroke: #d97706; stroke-width: 1.5; }
      .cal-box { fill: #2a1830; stroke: #db2777; stroke-width: 1.5; }
      .core-box { fill: #111c31; stroke: #334155; stroke-width: 1.5; }
      .decision-box { fill: url(#decisionFill); stroke: #10b981; stroke-width: 2; }
      .optional-box { fill: #1f1935; stroke: #8b5cf6; stroke-width: 1.5; }
      .output-box { fill: #092d2c; stroke: #14b8a6; stroke-width: 1.5; }
      .group { fill: #081326; fill-opacity: 0.76; stroke: #164e63; stroke-width: 1.5; }
      .live-line { fill: none; stroke: #22d3ee; stroke-width: 2.5; marker-end: url(#arrowLive); }
      .sim-line { fill: none; stroke: #f59e0b; stroke-width: 2.5; marker-end: url(#arrowSimulated); }
      .cal-line { fill: none; stroke: #f472b6; stroke-width: 2.5; marker-end: url(#arrowCalibration); }
      .internal-line { fill: none; stroke: #94a3b8; stroke-width: 2.2; marker-end: url(#arrowInternal); }
      .output-line { fill: none; stroke: #34d399; stroke-width: 2.8; marker-end: url(#arrowOutput); }
      .optional-line { fill: none; stroke: #a78bfa; stroke-width: 2.2; stroke-dasharray: 8 6; marker-end: url(#arrowInternal); }
    </style>
  </defs>

  <rect width="1800" height="1200" fill="url(#background)"/>
  <circle cx="1380" cy="90" r="300" fill="#0891b2" opacity="0.045"/>
  <circle cx="380" cy="1100" r="360" fill="#14b8a6" opacity="0.035"/>

  <text x="60" y="58" fill="#f8fafc" font-family="Inter, Segoe UI, sans-serif" font-size="30" font-weight="750">
    T&amp;TEC Weather-Based Generation Decision Support System
  </text>
  <text x="60" y="91" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="16">
    End-to-end program flow: live inputs, simulated grid, calibration, decision engine, persistence, map, and operator output
  </text>

  <!-- Section containers -->
  <rect class="group" x="40" y="135" width="330" height="875" rx="20" filter="url(#shadow)"/>
  <rect class="group" x="400" y="135" width="490" height="875" rx="20" filter="url(#shadow)"/>
  <rect class="group" x="920" y="135" width="400" height="875" rx="20" filter="url(#shadow)"/>
  <rect class="group" x="1350" y="135" width="410" height="875" rx="20" filter="url(#shadow)"/>

  <text class="section-label" x="65" y="175">DATA SOURCES</text>
  <text class="section-label" x="425" y="175">BACKEND SERVICES</text>
  <text class="section-label" x="945" y="175">DECISION CORE</text>
  <text class="section-label" x="1375" y="175">CONTROL-ROOM UI</text>

  <!-- Data source boxes -->
  <g filter="url(#shadow)">
    <rect class="live-box" x="65" y="205" width="280" height="120" rx="15"/>
    <text class="box-title" x="85" y="238">Weather Providers</text>
    <text class="box-copy" x="85" y="266">Open-Meteo Best Match</text>
    <text class="box-copy" x="85" y="288">MET Norway + NOAA GFS</text>
    <rect x="267" y="222" width="58" height="22" rx="11" fill="#083d45" stroke="#22d3ee"/>
    <text class="tag" x="280" y="237" fill="#a5f3fc">LIVE</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="sim-box" x="65" y="355" width="280" height="120" rx="15"/>
    <text class="box-title" x="85" y="388">Grid Provider</text>
    <text class="box-copy" x="85" y="416">Time-based demand curve</text>
    <text class="box-copy" x="85" y="438">Mock generation-unit output</text>
    <rect x="230" y="372" width="95" height="22" rx="11" fill="#3a2d13" stroke="#f59e0b"/>
    <text class="tag" x="239" y="387" fill="#fde68a">SIMULATED</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="cal-box" x="65" y="505" width="280" height="130" rx="15"/>
    <text class="box-title" x="85" y="538">SCADA Calibration Archive</text>
    <text class="box-copy" x="85" y="566">Ambient temperature samples</text>
    <text class="box-copy" x="85" y="588">Hot / typical / rainy profiles</text>
    <text class="small" x="85" y="612">Historical import, not live SCADA</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="optional-box" x="65" y="665" width="280" height="120" rx="15"/>
    <text class="box-title" x="85" y="698">Storm Feed</text>
    <text class="box-copy" x="85" y="726">NOAA / NHC Current Storms</text>
    <text class="small" x="85" y="750">Loaded only when map layer is on</text>
    <rect x="244" y="682" width="81" height="22" rx="11" fill="#2e2050" stroke="#a78bfa"/>
    <text class="tag" x="254" y="697" fill="#ddd6fe">OPTIONAL</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="optional-box" x="65" y="815" width="280" height="165" rx="15"/>
    <text class="box-title" x="85" y="848">Map-Only Data Feeds</text>
    <text class="box-copy" x="85" y="876">NASA GIBS cloud + rainfall</text>
    <text class="box-copy" x="85" y="898">Open-Meteo regional wind grid</text>
    <text class="box-copy" x="85" y="920">OSM / NASA base maps</text>
    <text class="small" x="85" y="950">Situational awareness only;</text>
    <text class="small" x="85" y="968">not used by probability logic</text>
  </g>

  <!-- Backend boxes -->
  <g filter="url(#shadow)">
    <rect class="core-box" x="425" y="205" width="440" height="90" rx="15"/>
    <text class="box-title" x="445" y="239">FastAPI API Layer</text>
    <text class="box-copy" x="445" y="266">Routes, validation, CORS, request logging</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="live-box" x="425" y="330" width="205" height="145" rx="15"/>
    <text class="box-title" x="445" y="365">WeatherService</text>
    <text class="box-copy" x="445" y="393">Retry and failover</text>
    <text class="box-copy" x="445" y="415">Forecast consensus</text>
    <text class="box-copy" x="445" y="437">Normalization + cache</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="sim-box" x="660" y="330" width="205" height="145" rx="15"/>
    <text class="box-title" x="680" y="365">GridService</text>
    <text class="box-copy" x="680" y="393">Normalize grid status</text>
    <text class="box-copy" x="680" y="415">Reserve margin</text>
    <text class="box-copy" x="680" y="437">Generation units</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="cal-box" x="425" y="510" width="205" height="145" rx="15"/>
    <text class="box-title" x="445" y="545">CalibrationService</text>
    <text class="box-copy" x="445" y="573">Score operating regime</text>
    <text class="box-copy" x="445" y="595">Select SCADA temperature</text>
    <text class="box-copy" x="445" y="617">Load demand + spin profile</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="optional-box" x="660" y="510" width="205" height="145" rx="15"/>
    <text class="box-title" x="680" y="545">Storm Service</text>
    <text class="box-copy" x="680" y="573">Fetch + retry</text>
    <text class="box-copy" x="680" y="595">15-minute cache</text>
    <text class="box-copy" x="680" y="617">Normalize advisories</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="core-box" x="425" y="700" width="440" height="145" rx="15"/>
    <text class="box-title" x="445" y="737">DashboardService</text>
    <text class="box-copy" x="445" y="765">Fetch weather, forecast, grid, and units concurrently</text>
    <text class="box-copy" x="445" y="789">Attach calibration and invoke decision engine</text>
    <text class="box-copy" x="445" y="813">Build quality metadata + one snapshot DTO</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="core-box" x="425" y="880" width="440" height="100" rx="15"/>
    <text class="box-title" x="445" y="916">Provider Health + Data Quality</text>
    <text class="box-copy" x="445" y="943">Freshness, fallback, consensus, quota, and source status</text>
  </g>

  <!-- Decision core -->
  <g filter="url(#shadow)">
    <rect class="decision-box" x="945" y="205" width="350" height="245" rx="18"/>
    <text class="box-title" x="970" y="242">RecommendationEngine</text>
    <text class="box-copy" x="970" y="275">Baseline probability: 0.25</text>
    <text class="box-copy" x="970" y="300">Raise: heat, humidity, demand gap,</text>
    <text class="box-copy" x="970" y="322">low reserve, scenario pressure</text>
    <text class="box-copy" x="970" y="350">Reduce: rainfall and cloud cover</text>
    <text class="box-copy" x="970" y="378">Clamp final score to 0.00 - 1.00</text>
    <rect x="970" y="397" width="300" height="30" rx="10" fill="#063b36" stroke="#34d399"/>
    <text class="tag" x="991" y="417" fill="#a7f3d0">RULE-BASED AND EXPLAINABLE</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="decision-box" x="945" y="485" width="350" height="160" rx="18"/>
    <text class="box-title" x="970" y="522">Decision Outputs</text>
    <text class="box-copy" x="970" y="550">Probability score + risk level</text>
    <text class="box-copy" x="970" y="574">30-minute + 60-minute demand</text>
    <text class="box-copy" x="970" y="598">Recommendation + reasoning factors</text>
    <text class="small" x="970" y="625">No automatic turbine control</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="core-box" x="945" y="700" width="350" height="145" rx="15"/>
    <text class="box-title" x="970" y="737">Snapshot Persistence</text>
    <text class="box-copy" x="970" y="765">Weather observations</text>
    <text class="box-copy" x="970" y="787">Grid snapshots</text>
    <text class="box-copy" x="970" y="809">Probability + recommendation</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="core-box" x="945" y="880" width="350" height="100" rx="15"/>
    <text class="box-title" x="970" y="916">SQLAlchemy Database</text>
    <text class="box-copy" x="970" y="943">SQLite local / PostgreSQL deployment-ready</text>
  </g>

  <!-- Frontend boxes -->
  <g filter="url(#shadow)">
    <rect class="output-box" x="1375" y="205" width="360" height="105" rx="15"/>
    <text class="box-title" x="1397" y="241">React API Client</text>
    <text class="box-copy" x="1397" y="269">GET /api/dashboard/snapshot</text>
    <text class="small" x="1397" y="290">Initial load + five-minute refresh</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="output-box" x="1375" y="345" width="360" height="135" rx="15"/>
    <text class="box-title" x="1397" y="381">Dashboard State</text>
    <text class="box-copy" x="1397" y="409">Loading, ready, error, retry</text>
    <text class="box-copy" x="1397" y="433">Typed snapshot + quality metadata</text>
    <text class="box-copy" x="1397" y="457">Persistent map + tab selection</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="output-box" x="1375" y="515" width="360" height="205" rx="15"/>
    <text class="box-title" x="1397" y="551">Tabbed Workspace</text>
    <text class="box-copy" x="1397" y="581">Home: operator overview</text>
    <text class="box-copy" x="1397" y="605">Operations: dispatch + readiness</text>
    <text class="box-copy" x="1397" y="629">Weather: current + next six hours</text>
    <text class="box-copy" x="1397" y="653">Demand / Risk / Guidance</text>
    <text class="box-copy" x="1397" y="677">Analytics: calibration profiles</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="optional-box" x="1375" y="755" width="360" height="145" rx="15"/>
    <text class="box-title" x="1397" y="791">Leaflet Operations Map</text>
    <text class="box-copy" x="1397" y="819">Cloud, rainfall, wind, storms</text>
    <text class="box-copy" x="1397" y="843">Infrastructure + country boundary</text>
    <text class="small" x="1397" y="872">Visual awareness; separate from engine</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="decision-box" x="1375" y="935" width="360" height="75" rx="15"/>
    <text class="box-title" x="1397" y="969">Control-Room Operator</text>
    <text class="box-copy" x="1397" y="993">Reviews guidance and makes the final decision</text>
  </g>

  <!-- Data-to-service arrows -->
  <path class="live-line" d="M345 265 C385 265 385 400 425 400"/>
  <path class="sim-line" d="M345 415 C505 415 510 402 660 402"/>
  <path class="cal-line" d="M345 570 C385 570 385 582 425 582"/>
  <path class="optional-line" d="M345 725 C500 725 515 582 660 582"/>

  <!-- API and service arrows -->
  <path class="internal-line" d="M645 295 L645 325"/>
  <path class="internal-line" d="M527 475 L527 505"/>
  <path class="internal-line" d="M527 655 C527 675 550 680 550 695"/>
  <path class="internal-line" d="M527 475 C527 610 570 650 610 695"/>
  <path class="internal-line" d="M763 475 C763 610 720 650 680 695"/>
  <path class="internal-line" d="M645 295 C645 320 763 300 763 325"/>
  <path class="internal-line" d="M645 845 L645 875"/>

  <!-- Dashboard to engine/output/persistence -->
  <path class="output-line" d="M865 755 C900 755 905 327 940 327"/>
  <path class="output-line" d="M1120 450 L1120 480"/>
  <path class="internal-line" d="M945 565 C895 565 900 790 865 790"/>
  <path class="internal-line" d="M865 810 C905 810 905 772 940 772"/>
  <path class="internal-line" d="M1120 845 L1120 875"/>

  <!-- Backend response through API to frontend -->
  <path class="output-line" d="M865 745 L900 745 L900 250 L870 250"/>
  <path class="output-line" d="M865 250 L1370 250"/>
  <text class="arrow-label" x="1015" y="235">Dashboard snapshot DTO</text>
  <path class="output-line" d="M1555 310 L1555 340"/>
  <path class="output-line" d="M1555 480 L1555 510"/>
  <path class="output-line" d="M1555 720 L1555 930"/>

  <!-- Map-only bypass -->
  <path class="optional-line" d="M345 895 C720 1060 1110 1050 1370 835"/>
  <path class="optional-line" d="M865 582 C1080 580 1180 790 1370 810"/>
  <text class="arrow-label" x="1090" y="1018">Visual feeds only</text>

  <!-- Legend -->
  <rect x="40" y="1045" width="1720" height="110" rx="18" fill="#071426" stroke="#1e3a5f"/>
  <text class="section-label" x="65" y="1080">LEGEND</text>
  <line x1="190" y1="1073" x2="245" y2="1073" stroke="#22d3ee" stroke-width="4"/>
  <text class="box-copy" x="257" y="1078">Live provider data</text>
  <line x1="430" y1="1073" x2="485" y2="1073" stroke="#f59e0b" stroke-width="4"/>
  <text class="box-copy" x="497" y="1078">Simulated Version 1 grid</text>
  <line x1="735" y1="1073" x2="790" y2="1073" stroke="#f472b6" stroke-width="4"/>
  <text class="box-copy" x="802" y="1078">Imported calibration</text>
  <line x1="1040" y1="1073" x2="1095" y2="1073" stroke="#a78bfa" stroke-width="4" stroke-dasharray="8 6"/>
  <text class="box-copy" x="1107" y="1078">Optional/map-only</text>
  <line x1="1325" y1="1073" x2="1380" y2="1073" stroke="#34d399" stroke-width="4"/>
  <text class="box-copy" x="1392" y="1078">Decision/output flow</text>

  <text class="small" x="65" y="1122">
    Safety boundary: WGDSS recommends actions; operators retain authority and the application does not directly control generation equipment.
  </text>
</svg>
